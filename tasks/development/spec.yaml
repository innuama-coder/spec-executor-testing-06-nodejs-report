version: "2.3"
name: "nodejs-report-summary"
repo:
  url: "https://github.com/innuama-coder/spec-executor-testing-06-nodejs-report.git"
  branch: "main"
task_dir: "tasks/development"
deliverables:
- path: "bin/report-summary.mjs"
  verify: "node test/self-test.mjs && node test/acceptance.mjs"
- path: "test/self-test.mjs"
  verify: "node test/self-test.mjs && node test/acceptance.mjs"
- path: "docs/DELIVERY.md"
  verify: "test -s docs/DELIVERY.md && grep -q \"^执行结果：通过$\" docs/DELIVERY.md"
execution:
  executor: "codex"
  poll_interval_sec: 2
  idle_timeout_sec: 90
  max_consecutive_escalate: 2
  agent:
    name: "nodejs-report-agent"
    role: "实现 Node.js 报告摘要命令并维护自测与验收脚本。"
    instructions:
      primary: PROMPT.md
      system: AGENTS.md
      additional:
      - "CLAUDE.md"
    context:
    - path: "PROMPT.md"
      required: true
    - path: "AGENTS.md"
      required: true
    - path: "CLAUDE.md"
      required: true
    tools:
      allow:
      - "shell"
      - "apply_patch"
      deny:
      - "network"
    permissions:
      sandbox: "workspace-write"
      approval: "on-request"
      network: false
    model:
      preferred: "default"
  review:
    max_iterations: 2
    items:
    - id: "REV-REPORT-001"
      source: "external-review"
      severity: "must"
      target: "docs/DELIVERY.md"
      issue: "交付说明不得记录 ENV 中的 token 值。"
      expected_fix: "只记录变量名和注入状态，不记录 token 明文。"
      acceptance: "grep -q \"执行结果：通过\" docs/DELIVERY.md"
verification:
  commands:
  - "node test/self-test.mjs"
  - "node test/acceptance.mjs"
  - "test -s docs/DELIVERY.md && grep -q \"^执行结果：通过$\" docs/DELIVERY.md"
reporting:
  include_evidence_refs: true
  handoff_required: true
package:
  env:
    path: "ENV"
    required: true
